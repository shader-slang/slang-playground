# Composite action to download and cache WASM dependencies (slang, spirv-tools)
name: 'Download WASM Deps'
description: 'Download and cache WASM dependencies (slang release, spirv-tools build) for the project.'
inputs:
  build-artifacts-dir:
    description: 'Directory to move built artifacts into.'
    required: true
    default: ./src
runs:
  using: 'composite'
  steps:
    - name: Setup emsdk (for SPIRV-tools build)
      if: steps.cache_spirv_tools.outputs.cache-hit != 'true'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build
        if [ ! -d "emsdk" ]; then
          git clone https://github.com/emscripten-core/emsdk.git
          sed -i 's/\r$//' emsdk/emsdk emsdk/emsdk_env.sh
        fi

    - name: get latest slang release
      shell: bash
      run: |
        # Use a known stable release until we can reliably fetch latest
        # In the future, this could be enhanced to fetch the latest release
        RELEASE_TAG="v2025.16.1"
        echo "Using Slang release: $RELEASE_TAG"
        echo "$RELEASE_TAG" > key.txt

    - name: get spirv-tool head commit
      shell: bash
      run: |
        if [ ! -d "spirv-tools" ]; then
          git clone https://github.com/KhronosGroup/SPIRV-Tools.git spirv-tools
          pushd spirv-tools
          git checkout vulkan-sdk-1.3.290.0
          popd
        fi
        git -C spirv-tools rev-parse HEAD > key-spirv-tool.txt

    - name: restore slang-wasm
      id: cache_slang
      uses: actions/cache/restore@v4
      with:
        path: |
          ./slang-wasm.wasm.gz
          ./slang-wasm.js
          ./slang-wasm.d.ts
        key: ${{ hashFiles('key.txt') }}

    - name: restore spirv-tools
      id: cache_spirv_tools
      uses: actions/cache/restore@v4
      with:
        path: |
          ./spirv-tools.wasm
          ./spirv-tools.js
          ./spirv-tools.d.ts
        key: ${{ hashFiles('key-spirv-tool.txt') }}

    - name: download slang-wasm release
      if: steps.cache_slang.outputs.cache-hit != 'true'
      shell: bash
      run: |
        # Use a known stable release
        RELEASE_TAG="v2025.16.1"
        WASM_URL="https://github.com/shader-slang/slang/releases/download/$RELEASE_TAG/slang-${RELEASE_TAG:1}-wasm.zip"
        
        echo "Downloading Slang WASM release from: $WASM_URL"
        curl -L -o slang-wasm.zip "$WASM_URL"
        
        # Extract the files
        unzip slang-wasm.zip
        
        # Rename interface.d.ts to slang-wasm.d.ts to match expected naming
        mv interface.d.ts slang-wasm.d.ts
        
        # Compress the WASM file as expected by the playground
        gzip -c slang-wasm.wasm > slang-wasm.wasm.gz
        
        # Clean up
        rm slang-wasm.zip slang-wasm.wasm

    - name: save slang-wasm
      if: steps.cache_slang.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: |
          ./slang-wasm.wasm.gz
          ./slang-wasm.js
          ./slang-wasm.d.ts
        key: ${{ hashFiles('key.txt') }}

    - name: spirv-tools-wasm build
      if: steps.cache_spirv_tools.outputs.cache-hit != 'true'
      shell: bash
      run: |
        /bin/bash -x ./build_scripts/spirv-tool-wasm-build.sh

    - name: save spirv-tools-wasm
      if: steps.cache_spirv_tools.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: |
          ./spirv-tools.wasm
          ./spirv-tools.js
          ./spirv-tools.d.ts
        key: ${{ hashFiles('key-spirv-tool.txt') }}

    - name: Move artifacts
      shell: bash
      run: |
        mkdir -p ${{ inputs.build-artifacts-dir }}
        mv ./slang-wasm.wasm.gz ./slang-wasm.js ./slang-wasm.d.ts ${{ inputs.build-artifacts-dir }}/
        mv ./spirv-tools.wasm ./spirv-tools.js ./spirv-tools.d.ts ${{ inputs.build-artifacts-dir }}/
        
        # Also copy type definitions to engine media directory for compilation
        mkdir -p ./engine/slang-compilation-engine/media
        cp ${{ inputs.build-artifacts-dir }}/slang-wasm.d.ts ./engine/slang-compilation-engine/media/
        cp ${{ inputs.build-artifacts-dir }}/spirv-tools.d.ts ./engine/slang-compilation-engine/media/
